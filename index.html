<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111827">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gente da Feira</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">

<header class="bg-white shadow-sm p-4 flex justify-between items-center">
  <div>
    <p class="text-sm text-gray-500">📍 Feira de Santana</p>
    <h1 class="text-lg font-bold">Gente da Feira</h1>
  </div>
  <button id="btn-sair" onclick="logout()" class="text-sm text-red-500 hidden">Sair</button>
</header>

<section class="p-4">
  <input 
    id="busca"
    type="text" 
    placeholder="O que você precisa agora?" 
    class="w-full p-4 rounded-xl border"
  >
</section>

<section class="px-4 grid grid-cols-2 gap-3">
  <button onclick="carregarEmpregos()" class="bg-white p-4 rounded-xl shadow">💼 Empregos</button>
  <button onclick="carregarServicos()" class="bg-white p-4 rounded-xl shadow">🧑‍🔧 Serviços</button>
</section>

<section class="p-4">
  <h2 class="font-bold mb-3">🧑‍🔧 Serviços</h2>
  <div id="servicos-container"></div>
</section>

<section class="p-4">
  <h2 class="font-bold mb-3">💼 Empregos</h2>
  <div id="empregos-container"></div>
</section>

<section class="p-4 pb-24">
  <h2 class="font-bold mb-3">💬 Bairro</h2>
  <div id="feed-container"></div>
</section>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 text-sm">
  <button onclick="init()">🏠</button>
  <button onclick="carregarFeed()">📍</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>

</body>
</html>
